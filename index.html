document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<script>var LEEK_SUPABASE_FN=\"https://rpivyhrxahdcysthqode.supabase.co/functions/v1/submit-run\";<\u002Fscript>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"faed771c-d087-4dfc-a6c3-0e0f89100bba\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n\n<style>\n  html,body{margin:0;padding:0;background:#000;}\n  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}\n  input{font-family:inherit;}\n  ::selection{background:rgba(10,132,255,0.3);}\n  @keyframes scrIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}\n  @keyframes beatIn{0%{opacity:0;transform:translateY(18px) scale(0.96)}100%{opacity:1;transform:translateY(0) scale(1)}}\n  @keyframes popIn{0%{opacity:0;transform:scale(0.8)}60%{transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}\n  @keyframes stampIn{0%{opacity:0;transform:scale(2.4) rotate(-12deg)}55%{opacity:1}100%{opacity:1;transform:scale(1) rotate(-7deg)}}\n  @keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}\n  @keyframes glowPulse{0%,100%{opacity:0.5}50%{opacity:1}}\n  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}\n  @keyframes riseUp{0%{opacity:0;transform:translateY(40px)}100%{opacity:1;transform:translateY(0)}}\n  @keyframes sheetUp{0%{transform:translateY(100%)}100%{transform:translateY(0)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"{{ themeStyle }}\">\n\n<!-- ====================================================================== -->\n<!-- ============================ 手機版 (narrow) ========================== -->\n<!-- ====================================================================== -->\n<sc-if value=\"{{ isNarrow }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"min-height:100vh;background:var(--app,#000);font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,sans-serif;display:flex;justify-content:center;align-items:stretch;position:relative;\">\n  <main style=\"width:100%;max-width:480px;background:var(--app,#000);min-height:100vh;position:relative;overflow:hidden;color:var(--ink,#f5f5f7);box-shadow:0 0 80px rgba(0,0,0,0.5);\">\n\n    <sc-if value=\"{{ isIntro }}\" hint-placeholder-val=\"{{ true }}\">\n      <section style=\"min-height:100vh;display:flex;flex-direction:column;padding:0 26px;position:relative;\">\n        <div style=\"position:absolute;top:18px;right:20px;z-index:3;\">\n          <button onclick=\"{{ skipIntro }}\" style=\"background:none;border:none;color:var(--mut,#8e8e93);font-size:13px;font-family:inherit;cursor:pointer;padding:8px;\">跳過 ›<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ introBeats }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;\">\n            <sc-if value=\"{{ intro0 }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"animation:beatIn .6s ease;\">\n                <div style=\"font-size:74px;font-weight:900;color:var(--ink,#f5f5f7);font-variant-numeric:tabular-nums;letter-spacing:-2px;\">06:30<\u002Fdiv>\n                <div style=\"width:8px;height:8px;border-radius:50%;background:var(--up,#ff453a);margin:18px auto;animation:blink 1s infinite;\"><\u002Fdiv>\n                <div style=\"font-size:17px;color:var(--mut,#8e8e93);margin-top:6px;\">鬧鐘響了。又是要上班的一天。<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ intro1 }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"animation:beatIn .6s ease;\">\n                <div style=\"font-size:42px;\">🪪<\u002Fdiv>\n                <div style=\"font-size:34px;font-weight:900;color:var(--ink,#f5f5f7);margin-top:14px;letter-spacing:2px;\">嗶 ——<\u002Fdiv>\n                <div style=\"display:inline-block;margin-top:18px;padding:7px 16px;border-radius:99px;background:var(--elev,#1c1c1e);border:1px solid var(--line,rgba(255,255,255,0.08));font-size:15px;color:var(--ink2,#c8c8cc);\">靈魂・打卡上班中<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ intro2 }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"animation:beatIn .6s ease;width:100%;max-width:360px;\">\n                <div style=\"font-size:16px;color:var(--mut,#8e8e93);margin-bottom:16px;\">趁老闆不注意，偷看一下盤……👀<\u002Fdiv>\n                <div style=\"background:var(--elev,#1c1c1e);border:1px solid var(--line,rgba(255,255,255,0.08));border-radius:14px;padding:12px;\">{{ chartIntro }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ intro3 }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"animation:beatIn .6s ease;\">\n                <div style=\"font-size:15px;color:var(--mut,#8e8e93);\">如果剛剛那一根，我重壓 100 倍……<\u002Fdiv>\n                <div style=\"font-size:64px;font-weight:900;color:var(--up,#ff453a);font-variant-numeric:tabular-nums;margin-top:10px;animation:popIn .6s ease;letter-spacing:-2px;\">+1,200%<\u002Fdiv>\n                <div style=\"font-size:17px;color:var(--ink2,#c8c8cc);margin-top:8px;\">💭 我就……財富自由了？<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ intro4 }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"animation:beatIn .6s ease;\">\n                <div style=\"font-size:17px;color:var(--mut,#8e8e93);\">於是，你決定報名一所學校——<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ intro5 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"flex:1;display:flex;flex-direction:column;al 53a);color:var(--up,#ff453a);font-weight:800;font-size:14px;font-family:inherit;cursor:pointer;\">把離職信甩在老闆臉上 👋<\u002Fbutton>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ flungDone }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:15px;font-weight:800;color:var(--up,#ff453a);animation:popIn .4s ease;\">✓ 已甩在老闆臉上，財富自由達成。<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <button onclick=\"{{ openShare }}\" style=\"margin-top:14px;width:100%;padding:14px;border:none;border-radius:14px;background:var(--acc,#0a84ff);color:#fff;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;\">📸 產生 IG／脆 分享卡<\u002Fbutton>\n        <div style=\"display:flex;gap:8px;margin-top:10px;\">\n          <button onclick=\"{{ shareResult }}\" style=\"flex:1;padding:13px;border:1px solid var(--line2,rgba(255,255,255,0.18));border-radius:12px;background:transparent;color:var(--ink,#f5f5f7);font-weight:700;font-size:14px;font-family:inherit;cursor:pointer;\">分享文字戰績<\u002Fbutton>\n          <button onclick=\"{{ copyResult }}\" style=\"flex:1;padding:13px;border:1px solid var(--line2,rgba(255,255,255,0.18));border-radius:12px;background:transparent;color:var(--ink,#f5f5f7);font-weight:700;font-size:14px;font-family:inherit;cursor:pointer;\">複製成績<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showAds }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"width:100%;height:250px;border:1px dashed var(--line2,rgba(255,255,255,0.18));border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--mut,#8e8e93);font-size:12px;margin:14px 0;\">廣告版位 300 × 250<\u002Fdiv><\u002Fsc-if>\n        <button onclick=\"{{ finishRun }}\" style=\"width:100%;margin-top:14px;padding:15px;border:none;border-radius:14px;background:var(--gold,#ffd60a);color:#1a1500;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;\">登錄戰力榜 →<\u002Fbutton>\n        <button onclick=\"{{ replay }}\" style=\"width:100%;margi k,#f5f5f7);font-variant-numeric:tabular-nums;letter-spacing:-4px;line-height:1;\">06:30<\u002Fdiv>\n                <div style=\"width:10px;height:10px;border-radius:50%;background:var(--up,#ff453a);margin:26px auto;animation:blink 1s infinite;\"><\u002Fdiv>\n                <div style=\"font-size:22px;color:var(--mut,#8e8e93);\">鬧鐘響了。又是要上班的一天。<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ intro1 }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"animation:beatIn .6s ease;\">\n                <div style=\"font-size:64px;\">🪪<\u002Fdiv>\n                <div style=\"font-size:54px;font-weight:900;color:var(--ink,#f5f5f7);margin-top:18px;letter-spacing:3px;\">嗶 ——<\u002Fdiv>\n                <div style=\"display:inline-block;margin-top:24px;padding:10px 22px;border-radius:99px;background:var(--elev,#1c1c1e);border:1px solid var(--line,rgba(255,255,255,0.08));font-size:19px;color:var(--ink2,#c8c8cc);\">靈魂・打卡上班中<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ intro2 }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"animation:beatIn .6s ease;width:100%;max-width:620px;\">\n                <div style=\"font-size:21px;color:var(--mut,#8e8e93);margin-bottom:22px;\">趁老闆不注意，偷看一下盤……👀<\u002Fdiv>\n                <div style=\"background:var(--elev,#1c1c1e);border:1px solid var(--line,rgba(255,255,255,0.08));border-radius:18px;padding:18px;\">{{ chartIntroBig }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ intro3 }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"animation:beatIn .6s ease;\">\n                <div style=\"font-size:20px;color:var(--mut,#8e8e93);\">如果剛剛那一根，我重壓 100 倍……<\u002Fdiv>\n                <div style=\"font-size:104px;font-weight:900;color:var(--up,#ff453a);font-variant-numeric:tabular-nums;margin-top:14px;animation:popIn .6s ease;letter-spacing:-3px;line-height:1;\">+1,200%<\u002Fdiv>\n                <div style=\"font-size:23px;color:var(--ink2,#c8c8cc);margin-top:14px;\">💭 我就……財富自由了？<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ intro4 }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"animation:beatIn .6s ease;\"><div style=\"font-size:24px;color:var(--mut,#8e8e93);\">於是，你決定報名一所學校——<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ intro5 }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;animation:beatIn .7s ease;\">\n              <div style=\"font-size:15px;letter-spacing:8px;color:var(--goldd,#c9a227);\">股 神 培 訓 機 構<\u002Fdiv>\n              <h1 style=\"font-family:'Noto Serif TC',serif;font-weight:900;font-size:92px;color:var(--ink,#f5f5f7);margin:18px 0 10px;letter-spacing:4px;line-height:1;\">韭菜大學<\u002Fh1>\n              <div style=\"font-size:18px;color:var(--mut,#8e8e93);max-width:440px;line-height:1.7;\">10 關、100 萬本金，幻想一場財富自由。畢業時看你在台灣財富階梯的哪一階。<\u002Fdiv>\n              <button onclick=\"{{ enterName }}\" style=\"margin-top:38px;width:280px;padding:18px;border:none;border-radius:16px;background:var(--gold,#ffd60a);color:#1a1500;font-size:19px;font-weight:800;font-family:inherit;cursor:pointer;animation:popIn .5s ease .15s both;\">入學就讀 →<\u002Fbutton>\n              <button onclick=\"{{ gotoBoard }}\" style=\"margin-top:14px;width:280px;padding:15px;border:1px solid var(--line2,rgba(255,255,255,0.18));border-radius:16px;background:transparent;color:var(--ink,#f5f5f7);font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;\">看股神戰力榜<\u002Fbutton>\n              <div style=\"margin-top:30px;font-size:12px;color:var(--mut,#8e8e93);line-height:1.6;max-width:420px;\">⚠ 本遊戲僅供娛樂，所有走勢與數據皆為示範，<b style=\"color:var(--ink2,#c8c8cc);\">絕非投資建議<\u002Fb>。<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ============ 桌機 入學 ============ -->\n    <sc-if value=\"{{ isName }}\" hint-placeholder-val=\"{{ false }}\">\n      <section style=\"flex:1;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:46px 0;\">\n        <div style=\"text-align:center;margin-bottom:30px;\">\n          <div style=\"font-size:13px;letter-spacing:6px;color:var(--goldd,#c9a227);\">股 神 培 訓 機 構<\u002Fdiv>\n          <h1 style=\"font-family:'Noto Serif TC',serif;font-weight:900;font-size:54px;color:var(--ink,#f5f5f7);margin:10px 0 0;letter-spacing:2px;\">韭菜大學<\u002Fh1>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:26px;align-items:stretch;max-width:920px;width:100%;margin:0 auto;\">\n          <div style=\"flex:1.05;min-width:0;background:var(--elev,#1c1c1e);border:1px solid var(--line,rgba(255,255,255,0.08));border-radius:20px;padding:28px;\">\n            <div style=\"font-size:16px;font-weight:800;color:var(--gold,#ffd60a);margin-bottom:16px;\">📖 遊戲說明<\u002Fdiv>\n            <div style=\"font-size:14.5px;line-height:1.6;color:var(--ink2,#c8c8cc);display:flex;flex-direction:column;gap:14px;\">\n              <div style=\"display:flex;gap:11px;\"><span style=\"color:var(--acc,#0a84ff);font-weight:800;\">1<\u002Fspan><span>開局給你 <b style=\"color:var(--ink,#f5f5f7);\">100 萬<\u002Fb>本金、共 <b style=\"color:var(--ink,#f5f5f7);\">10 關<\u002Fb>，每關看一段被蓋住結局的神祕個股走勢。<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:11px;\"><span style=\"color:var(--acc,#0a84ff);font-weight:800;\">2<\u002Fspan><span>判斷它<b style=\"color:var(--ink,#f5f5f7);\">接下來<\u002Fb>會漲還跌，設好<b style=\"color:var(--ink,#f5f5f7);\">押注金額<\u002Fb>與<b style=\"color:var(--ink,#f5f5f7);\">槓桿（最高 100 倍）<\u002Fb>。<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:11px;\"><span style=\"color:var(--acc,#0a84ff);font-weight:800;\">3<\u002Fspan><span>損益＝押注 × 槓桿 × 漲跌幅。槓桿越大賺賠越兇，<b style=\"color:var(--up,#ff453a);\">賠到負的就破產出局<\u002Fb>，每筆收 0.1% 稅費。<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:11px;\"><span style=\"color:var(--acc,#0a84ff);font-weight:800;\">4<\u002Fspan><span>可把資產配置到 <b style=\"color:var(--acc,#0a84ff);\">ETF（每回合 +5%）<\u002Fb>鎖定獲利；但所有錢每回合被<b style=\"color:var(--ink,#f5f5f7);\">通膨吃 3%<\u002Fb>。<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:11px;\"><span style=\"color:var(--acc,#0a84ff);font-weight:800;\">5<\u002Fspan><span>10 關後結算、頒學位（依台灣家庭財富階梯）、登上<b style=\"color:var(--ink,#f5f5f7);\">戰力榜<\u002Fb>。<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:11px;\"><span style=\"color:var(--acc,#0a84ff);font-weight:800;\">6<\u002Fspan><span><b style=\"color:var(--gold,#ffd60a);\">每日挑戰<\u002Fb>：全球同一天同一份 10 關，比判斷力不比運氣。<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;min-width:0;background:var(--elev,#1c1c1e);border:1px solid var(--line,rgba(255,255,255,0.08));border-radius:20px;padding:28px;display:flex;flex-direction:column;\">\n            <div style=\"font-size:13px;color:var(--mut,#8e8e93);font-weight:700;margin-bottom:8px;\">你的股神代號（上限 14 字）<\u002Fdiv>\n            <input value=\"{{ name }}\" onchange=\"{{ setName }}\" maxlength=\"14\" placeholder=\"例如：航海王韭韭\" style=\"width:100%;font-size:18px;padding:14px;border:1px solid var(--line2,rgba(255,255,255,0.18));border-radius:14px;background:var(--elev2,#2c2c2e);color:var(--ink,#f5f5f7);text-align:center;outline:none;\">\n            <div style=\"font-size:13px;color:var(--mut,#8e8e93);font-weight:700;margin:20px 0 9px;\">選一個大頭貼<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:9px;justify-content:center;\">\n              <sc-for list=\"{{ avatars }}\" as=\"av\" hint-placeholder-count=\"20\"><button onclick=\"{{ av.pick }}\" style=\"{{ av.style }}\">{{ av.ch }}<\u002Fbutton><\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-size:13px;color:var(--mut,#8e8e93);font-weight:700;margin:22px 0 7px;\">你的財富自由目標（萬）<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:10px;\">\n              <input value=\"{{ goalMan }}\" onchange=\"{{ setGoal }}\" inputmode=\"numeric\" style=\"flex:1;font-size:18px;padding:14px;border:1px solid var(--line2,rgba(255,255,255,0.18));border-radius:14px;background:var(--elev2,#2c2c2e);color:var(--ink,#f5f5f7);text-align:center;outline:none;font-variant-numeric:tabular-nums;\">\n              <span style=\"font-size:15px;color:var(--mut,#8e8e93);\">萬<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"flex:1;\"><\u002Fdiv>\n            <button onclick=\"{{ createProfile }}\" style=\"margin-top:24px;width:100%;padding:16px;border:none;border-radius:14px;background:var(--gold,#ffd60a);color:#1a1500;font-size:17px;font-weight:800;font-family:inherit;cursor:pointer;\">入學就讀<\u002Fbutton>\n            <button onclick=\"{{ gotoBoard }}\" style=\"margin-top:11px;width:100%;padding:14px;border:1px solid var(--line2,rgba(255,255,255,0.18));border-radius:14px;background:transparent;color:var(--ink,#f5f5f7);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;\">看戰力榜<\u002Fbutton>\n            <div style=\"text-align:center;font-size:11px;color:var(--mut,#8e8e93);margin-top:16px;line-height:1.6;\">⚠ 純娛樂遊戲，走勢為示範資料，<b style=\"color:var(--ink2,#c8c8cc);\">非投資建議<\u002Fb>。<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ============ 桌機 下注頁（核心） ============ -->\n    <sc-if value=\"{{ isBet }}\" hint-placeholder-val=\"{{ false }}\">\n      <section style=\"flex:1;display:flex;flex-direction:column;\">\n        <!-- 頂部：行情條(terminal) / 品牌列(split/cockpit) -->\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding-bottom:4px;\">\n          <div style=\"display:flex;align-items:center;gap:11px;\">\n            <div style=\"width:42px;height:42px;border-radius:50%;background:var(--elev,#1c1c1e);display:flex;align-items:center;justify-content:center;font-size:22px;\">{{ avatarTop }}<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;line-height:1.25;\">\n              <span style=\"font-size:17px;font-weight:800;color:var(--ink,#f5f5f7);\">{{ nameTop }}<\u002Fspan>\n              <span style=\"font-size:12px;color:var(--mut,#8e8e93);\">韭菜大學 · 在學中 · 神祕個股 #{{ mid }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:18px;\">\n            <div style=\"display:inline-flex;align-items:center;gap:7px;background:var(--elev,#1c1c1e);border:1px solid var(--line,rgba(255,255,255,0.08));color:var(--ink,#f5f5f7);font-size:14px;font-weight:700;padding:8px 15px;border-radius:99px;\"><span>📊<\u002Fspan>【{{ kTypeLbl }} · 猜{{ winLbl }}】<\u002Fdiv>\n            <div style=\"text-align:right;\">\n              <div style=\"font-size:12px;color:var(--mut,#8e8e93);\">第 <b style=\"color:var(--ink,#f5f5f7);\">{{ level }}<\u002Fb> / 10 關<\u002Fdiv>\n              <div style=\"display:flex;gap:4px;margin-top:6px;justify-content:flex-end;\"><sc-for list=\"{{ levelDots }}\" as=\"d\" hint-placeholder-count=\"10\"><span style=\"{{ d.style }}\"><\u002Fspan><\u002Fsc-for><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- 儀表板：頂部 KPI 卡橫排 -->\n        <sc-if value=\"{{ deskCockpit }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:14px;margin-top:14px;\">\n            <div style=\"background:var(--elev,#1c1c1e);border:1px solid var(--line,rgba(255,255,255,0.08));border-radius:16px;padding:16px 18px;\">\n              <div style=\"font-size:12px;color:var(--mut,#8e8e93);\">可賭現金<\u002Fdiv>\n              <div style=\"font-size:30px;font-weight:800;color:var(--ink,#f5f5f7);font-variant-numeric:tabular-nums;letter-spacing:-1px;line-height:1.15;margin-top:2px;\">NT$ {{ cashFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:var(--elev,#1c1c1e);border:1px solid var(--line,rgba(255,255,255,0.08));border-radius:16px;padding:16px 18px;\">\n              <div style=\"font-size:12px;color:var(--acc,#0a84ff);\">ETF 存款<\u002Fdiv>\n              <div style=\"font-size:22px;font-weight:800;color:var(--acc,#0a84ff);font-variant-numeric:tabular-nums;margin-top:4px;\">{{ etfFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:var(--elev,#1c1c1e);border:1px solid var(--line,rgba(255,255,255,0.08));border-radius:16px;padding:16px 18px;\">\n              <div style=\"font-size:12px;color:var(--goldd,#c9a227);\">目標 {{ goalManFmt }} 萬<\u002Fdiv>\n              <div style=\"font-size:22px;font-weight:800;color:var(--gold,#ffd60a);font-variant-numeric:tabular-nums;margin-top:4px;\">{{ goalPct }}%<\u002Fdiv>\n              <div style=\"height:5px;border-radius:99px;background:var(--elev2,#2c2c2e);overflow:hidden;margin-top:8px;\"><div style=\"{{ goalFillStyle }}\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:var(--elev,#1c1c1e);border:1px solid var(--line,rgba(255,255,255,0.08));border-radius:16px;padding:16px 18px;\">\n              <div style=\"font-size:12px;color:var(--mut,#8e8e93);\">關卡進度<\u002Fdiv>\n              <div style=\"font-size:22px;font-weight:800;color:var(--ink,#f5f5f7);font-variant-numeric:tabular-nums;margin-top:4px;\">{{ level }} <span style=\"font-size:14px;color:var(--mut,#8e8e93);\">/ 10<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"{{ deskColsStyle }}\">\n          <!-- 左：圖表 + 指標 (+ 資產, 非儀表板) -->\n          <div style=\"{{ deskLeftStyle }}\">\n            <div style=\"{{ deskPanelStyle }}\">\n              <sc-if value=\"{{ deskAssetsInLeft }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:14px;\">\n                  <div>\n                    <div style=\"font-size:12px;color:var(--mut,#8e8e93);\">可賭現金<\u002Fdiv>\n                    <div style=\"font-size:38px;font-weight:800;color:var(--ink,#f5f5f7);letter-spacing:-1.5px;font-variant-numeric:tabular-nums;line-height:1.05;\">NT$ {{ cashFmt }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:7px;align-items:flex-end;\">\n                    <div style=\"display:flex;align-items:center;gap:6px;background:var(--accBg);padding:5px 11px;border-radius:8px;\"><span style=\"font-size:12px;color:var(--acc,#0a84ff);\">ETF 存款<\u002Fspan><span style=\"font-size:12px;font-weight:700;color:var(--acc,#0a84ff);font-variant-numeric:tabular-nums;\">{{ etfFmt }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:4px;background:var(--goldBg);padding:5px 11px;border-radius:8px;\"><span style=\"font-size:12px;color:var(--goldd,#c9a227);font-weight:600;\">目標 {{ goalManFmt }} 萬 · {{ goalPct }}%<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"height:6px;border-radius:99px;background:var(--elev2,#2c2c2e);overflow:hidden;margin-bottom:4px;\"><div style=\"{{ goalFillStyle }}\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"{{ deskChartInsetStyle }}\">{{ chartBetBig }}\n                <div style=\"position:absolute;top:12px;right:12px;bottom:12px;width:12%;background:linear-gradient(90deg,rgba(0,0,0,0),var(--app,#000) 60%);display:flex;align-items:center;justify-content:center;pointer-events:none;\"><span style=\"font-size:30px;font-weight:800;color:var(--mut,#8e8e93);opacity:0.55;\">?<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:16px;margin-top:11px;font-size:11.5px;color:var(--mut,#8e8e93);\">\n                <span style=\"display:flex;align-items:center;gap:5px;\"><i style=\"width:13px;height:2.5px;background:#ff9f0a;border-radius:2px;\"><\u002Fi>MA5<\u002Fspan>\n                <span style=\"display:flex;align-items:center;gap:5px;\"><i style=\"width:13px;height:2.5px;background:var(--acc,#0a84ff);border-radius:2px;\"><\u002Fi>MA10<\u002Fspan>\n                <span style=\"display:flex;align-items:center;gap:5px;\"><i style=\"width:10px;height:10px;background:var(--up,#ff453a);border-radius:2px;\"><\u002Fi>紅漲<\u002Fspan>\n                <span style=\"display:flex;align-items:center;gap:5px;\"><i style=\"width:10px;height:10px;background:var(--down,#30d158);border-radius:2px;\"><\u002Fi>綠跌<\u002Fspan>\n                <span style=\"margin-left:auto;color:var(--mut,#8e8e93);\">最右側被蓋住的＝你要預測的未來<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:14px;\">\n              <div style=\"flex:1;background:var(--elev,#1c1c1e);border-left:2px solid var(--acc,#0a84ff);border-radius:12px;padding:10px 14px;\"><div style=\"font-size:9px;color:var(--mut,#8e8e93);margin-bottom:4px;letter-spacing:1px;\">📰 市場消息<\u002Fdiv><div style=\"font-size:11.5px;color:var(--ink,#f5f5f7);line-height:1.6;\">{{ newsHint }}<\u002Fdiv><\u002Fdiv>\n                {{ macdElBig }}\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- 右：下單台 -->\n          <div style=\"{{ deskRightStyle }}\">\n            <div style=\"{{ deskTicketStyle }}\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line,rgba(255,255,255,0.08));padding-bottom:13px;\">\n                <span style=\"font-size:16px;font-weight:800;color:var(--ink,#f5f5f7);\">下單<\u002Fspan>\n                <span style=\"font-size:11px;letter-spacing:2px;color:var(--mut,#8e8e93);\">ORDER TICKET<\u002Fspan>\n              <\u002Fdiv>\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:10px;\"><span style=\"color:var(--acc,#0a84ff);\">配置到 ETF（抗通膨）<\u002Fspan><span style=\"color:var(--acc,#0a84ff);font-weight:700;\">{{ etfPct }}%<\u002Fspan><\u002Fdiv>\n                <div style=\"position:relative;height:8px;border-radius:99px;background:var(--elev2,#2c2c2e);\">\n                  <div style=\"{{ etfFillStyle }}\"><\u002Fdiv>\n                  <input type=\"range\" min=\"0\" max=\"100\" step=\"5\" value=\"{{ etfPct }}\" onchange=\"{{ setEtf }}\" style=\"position:absolute;left:0;top:-8px;width:100%;height:24px;margin:0;opacity:0;cursor:pointer;\">\n                  <div style=\"{{ etfThumbStyle }}\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:10px;\"><span style=\"color:var(--mut,#8e8e93);\">融資槓桿<\u002Fspan><span style=\"color:var(--ink,#f5f5f7);font-weight:700;\">{{ levVal }}x<\u002Fspan><\u002Fdiv>\n                <div style=\"position:relative;height:8px;border-radius:99px;background:var(--elev2,#2c2c2e);\">\n                  <div style=\"{{ levFillStyle }}\"><\u002Fdiv>\n                  <input type=\"range\" min=\"1\" max=\"100\" step=\"1\" value=\"{{ levVal }}\" onchange=\"{{ setLev }}\" style=\"position:absolute;left:0;top:-8px;width:100%;height:24px;margin:0;opacity:0;cursor:pointer;\">\n                  <div style=\"{{ levThumbStyle }}\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;justify-content:space-between;font-size:11px;color:var(--mut,#8e8e93);margin-top:10px;\"><span>爆倉風險：<b style=\"{{ riskStyle }}\">{{ riskLbl }}<\u002Fb><\u002Fspan><span>稅費 NT$ <b style=\"color:var(--ink,#f5f5f7);\">{{ feeFmt }}<\u002Fb><\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;margin-bottom:8px;\"><span style
